[build]
  publish = "apps/web/dist"
  command = "pnpm run build:web"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  SENTRY_DISABLE_UPLOAD = "true"

[[redirects]]
  from = "/api/*"
  to = "https://infamous-freight.fly.dev/api/:splat"
  status = 200

[[redirects]]
  from = "/socket.io/*"
  to = "https://infamous-freight.fly.dev/socket.io/:splat"
  status = 200

[[redirects]]
  from = "/*.map"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-sitemap"
