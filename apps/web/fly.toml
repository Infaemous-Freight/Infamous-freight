# fly.toml app configuration file generated for infamous-freight on 2026-04-18T07:06:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'infamous-freight-enterprises-ra8cwg'
primary_region = 'dfw'

[build]
  context = "../.."
  dockerfile = "apps/web/Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "40s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
