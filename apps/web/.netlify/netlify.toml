headersOrigin = "config"
redirectsOrigin = "config"

[functions]

[functions."*"]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6"

[plugins.inputs]

[[plugins]]
origin = "config"
package = "@netlify/plugin-sitemap"

[plugins.inputs]

[build]
publish = "/opt/build/repo/apps/web/apps/web/dist"
publishOrigin = "config"
commandOrigin = "config"
base = "/opt/build/repo/apps/web"
command = "npm run build"

[build.environment]
NODE_VERSION = "22"
NPM_FLAGS = "--legacy-peer-deps"
NETLIFY_NEXT_PLUGIN_SKIP = "true"
SENTRY_DISABLE_UPLOAD = "true"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.infamousfreight.com wss://api.infamousfreight.com https://*.supabase.co https://*.ingest.sentry.io https://*.ingest.us.sentry.io; frame-src https://js.stripe.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

