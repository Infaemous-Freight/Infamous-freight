name: Setup Workspace
description: Checkout, setup pnpm + Node.js, install deps, build shared package
inputs:
  node-version-file:
    description: Path to .nvmrc
    default: .nvmrc
  build-shared:
    description: Whether to build shared package
    default: 'true'
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Build shared package
      if: inputs.build-shared == 'true'
      run: pnpm run build:shared
      shell: bash
