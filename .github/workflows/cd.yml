name: CD Pipeline (Deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-api:
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-web:
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  production-validation:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Validate deployed endpoints
        env:
          DEPLOYED_API_URL: ${{ needs.deploy-api.outputs.app_url }}
          DEPLOYED_WEB_URL: ${{ needs.deploy-web.outputs.deploy_url }}
        run: |
          if [ -z "$DEPLOYED_API_URL" ]; then
            echo "::error::DEPLOYED_API_URL is empty — Fly.io deploy did not produce an app URL."
            exit 1
          fi
          if [ -z "$DEPLOYED_WEB_URL" ]; then
            echo "::error::DEPLOYED_WEB_URL is empty — Vercel deploy did not produce a deploy URL."
            exit 1
          fi

          echo "Validating API: $DEPLOYED_API_URL"
          curl -f "$DEPLOYED_API_URL"

          echo "Validating Web: $DEPLOYED_WEB_URL"
          curl -If "$DEPLOYED_WEB_URL" > /dev/null
