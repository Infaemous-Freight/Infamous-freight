name: Area Validation Matrix

on:
  workflow_dispatch:

jobs:
  validate:
    name: "validation / ${{ matrix.validation }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validation: [sanity, lint, typecheck, test, build, codeql, audit]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run matrix validation selector
        shell: bash
        run: |
          set -euo pipefail
          validation='${{ matrix.validation }}'

          run_if_matches() {
            local expected="$1"
            shift
            if [ "$validation" = "$expected" ]; then
              echo "Running $expected"
              "$@"
              exit 0
            fi
          }

          run_if_matches sanity pnpm run format:check
          run_if_matches lint pnpm run lint
          run_if_matches typecheck pnpm run typecheck
          run_if_matches test pnpm run test:ci
          run_if_matches build pnpm run build
          run_if_matches audit pnpm run audit:ci

          if [ "$validation" = "codeql" ]; then
            echo "CodeQL is executed in .github/workflows/codeql.yml"
            exit 0
          fi

          echo "Unknown validation target: $validation"
          exit 1
