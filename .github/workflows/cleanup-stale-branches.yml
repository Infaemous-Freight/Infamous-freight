name: Cleanup Stale Branches

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list branches without deleting)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete Stale Branches
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale branches
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const staleBranches = [
              'codex/tmp-rebase-pr-1552-on-main-2026-04-25',
              'codex/add-openai-domain-verification',
              'codex/fix-all-checks-to-green-on-main-branch',
              'codex/infamous-add-domain-verification-keys-2026-04-17',
              'codex/make-github-main-branch-green',
              'copilot/enable-github-pages-main',
              'copilot/optimize-maintainability-security',
            ];

            const dryRun = ${{ inputs.dry_run }};
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.info(`Mode: ${dryRun ? 'DRY RUN (no deletions)' : 'LIVE (branches will be deleted)'}`);

            for (const branch of staleBranches) {
              let exists = false;
              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                exists = true;
              } catch (e) {
                if (e.status === 404) {
                  core.info(`  SKIP  ${branch} (already deleted)`);
                  continue;
                }
                throw e;
              }

              if (exists) {
                if (dryRun) {
                  core.info(`  [DRY RUN] Would delete: ${branch}`);
                } else {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${branch}`,
                  });
                  core.info(`  DELETED ${branch}`);
                }
              }
            }

            if (dryRun) {
              core.notice('Dry run complete. Re-run with dry_run=false to perform actual deletion.');
            } else {
              core.notice('Branch cleanup complete.');
            }
