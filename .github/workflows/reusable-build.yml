name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: "Workspace package name to build (e.g., api, web, @infamous-freight/shared)"
      node-version:
        required: false
        type: string
        default: "24"
        description: "Node.js version to use"
      working-directory:
        required: false
        type: string
        default: "."
        description: "Working directory for the build"
      build-command:
        required: false
        type: string
        default: "build"
        description: "Build command to run"
      artifact-name:
        required: false
        type: string
        default: "build-output"
        description: "Name for the build artifact"
      artifact-path:
        required: false
        type: string
        default: "dist"
        description: "Path to artifact files"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.package-name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm (use packageManager)
        uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6
        with:
          run_install: false

      - name: Setup Node cache
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build shared package (if needed)
        run: pnpm --filter @infamous-freight/shared build || echo "No shared package or already built"
        continue-on-error: true

      - name: Build ${{ inputs.package-name }}
        working-directory: ${{ inputs.working-directory }}
        run: pnpm --filter ${{ inputs.package-name }} ${{ inputs.build-command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          retention-days: 7

      - name: Publish build summary
        run: |
          echo "## 🔨 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | \`${{ inputs.package-name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Node Version** | ${{ inputs.node-version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | ${{ inputs.artifact-name }} |" >> $GITHUB_STEP_SUMMARY
