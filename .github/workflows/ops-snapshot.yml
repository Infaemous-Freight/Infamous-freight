name: Ops Snapshot

on:
  pull_request:
  push:
    branches: [main]

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run production snapshot
        run: pnpm run snapshot:prod | tee ops-snapshot.log
      - name: Upload snapshot log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-snapshot-log
          path: ops-snapshot.log
