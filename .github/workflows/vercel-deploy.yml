name: Deploy Web (Vercel)

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      deploy_url:
        description: "Deployed Vercel app URL"
        value: ${{ jobs.deploy-web.outputs.deploy_url }}

permissions:
  contents: read

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN secret"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing VERCEL_ORG_ID secret"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID secret"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build (Prod)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy (Prod)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        working-directory: apps/web

      - name: Health check
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Vercel deploy URL not found"
            exit 1
          fi
          echo "Checking $DEPLOY_URL"
          curl -I -sf "$DEPLOY_URL" > /dev/null

      - name: Deployment summary
        run: |
          echo "## ▲ Vercel Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard**: https://vercel.com/dashboard" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment status
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          deploy_status="${{ job.status }}"
          deploy_url="${{ steps.deploy.outputs.deploy_url }}"
          {
            echo "## ▲ Vercel Deploy Notification"
            echo ""
            echo "- **Status**: ${deploy_status}"
            echo "- **URL**: ${deploy_url:-N/A}"
            echo "- **Ref**: \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            summary="Vercel deploy ${deploy_status} for ${GITHUB_REF_NAME} — ${deploy_url:-no URL}"
            payload=$(SUMMARY="$summary" python3 -c 'import json, os; print(json.dumps({"text": os.environ["SUMMARY"]}))')
            curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" >/dev/null
          fi
