name: Phase 9 CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: infamous_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Type checking
        run: pnpm typecheck

      - name: Run migrations
        run: |
          cd apps/api
          pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infamous_test

      - name: Run unit tests
        run: pnpm --filter api test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infamous_test
          JWT_SECRET: test-secret
          REDIS_URL: redis://localhost:6379

      - name: Run Phase 9 tests
        run: pnpm --filter api test -- apps/api/tests/phase9.test.js
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infamous_test
          JWT_SECRET: test-secret
          REDIS_URL: redis://localhost:6379

      - name: Generate coverage report
        run: pnpm --filter api test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: api
          name: api-coverage

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: "."
          format: "JSON"

      - name: Upload OWASP results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  performance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 && echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list && sudo apt-get update && sudo apt-get install k6

      - name: Run load tests
        run: k6 run tools/load-tests/phase9-load-test.js
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Build API
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @infamous-freight/shared build
          pnpm --filter api build

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t infamous-freight-api:latest -f apps/api/Dockerfile .
          docker tag infamous-freight-api:latest infamous-freight-api:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add deployment commands here
          bash deploy-phase9.sh
        env:
          ENVIRONMENT: staging
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://api.infamous-freight.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          bash deploy-phase9.sh
        env:
          ENVIRONMENT: production
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
