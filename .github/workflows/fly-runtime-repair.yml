name: Fly Runtime Repair

on:
  workflow_dispatch:
    inputs:
      postgres_app_name:
        description: 'Optional Fly Postgres app name to attach and create DATABASE_URL'
        required: false
        default: 'infamous'
        type: string
      primary_region:
        description: 'Region to keep one warm machine running'
        required: false
        default: 'dfw'
        type: string
      cors_origins:
        description: 'Allowed production CORS origins'
        required: false
        default: 'https://www.infamousfreight.com,https://infamousfreight.com'
        type: string
  push:
    branches: [main]
    paths:
      - '.github/workflows/fly-runtime-repair.yml'

permissions:
  contents: read

concurrency:
  group: fly-runtime-repair
  cancel-in-progress: true

jobs:
  repair:
    name: Repair Fly runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master (2026-04-08)

      - name: Repair runtime settings and verify health
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          APP_NAME: infamous-freight
          PRIMARY_REGION: ${{ inputs.primary_region || 'dfw' }}
          POSTGRES_APP_NAME: ${{ inputs.postgres_app_name || 'infamous' }}
          CORS_ORIGINS: ${{ inputs.cors_origins || 'https://www.infamousfreight.com,https://infamousfreight.com' }}
        run: bash scripts/fly-runtime-repair.sh
