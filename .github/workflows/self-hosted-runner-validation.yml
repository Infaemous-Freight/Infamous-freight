name: Self-Hosted Runner Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/self-hosted-runner-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/self-hosted-runner-validation.yml'

permissions:
  contents: read

concurrency:
  group: self-hosted-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-self-hosted:
    name: Validate on self-hosted runner
    runs-on: [self-hosted, linux, x64, production]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: '22'

      - name: Enable corepack and pin pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/api prisma:generate

      - name: API tests (runInBand)
        run: pnpm -C apps/api test

      - name: API build
        run: pnpm -C apps/api build

      - name: Web build
        run: pnpm -C apps/web build
