name: Self-Hosted Runner Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/self-hosted-runner-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/self-hosted-runner-validation.yml'

permissions:
  contents: read

concurrency:
  group: self-hosted-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-self-hosted:
    name: Validate on self-hosted runner
    runs-on: [self-hosted, linux, x64, production]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/api prisma:generate

      - name: API tests (runInBand)
        run: pnpm -C apps/api test

      - name: API build
        run: pnpm -C apps/api build

      - name: Web build
        run: pnpm -C apps/web build
