name: CI Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Validate repository
        run: bash scripts/ci-validate.sh
