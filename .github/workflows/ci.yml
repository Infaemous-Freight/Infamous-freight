name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '22.16.0'
  PNPM_VERSION: '8.15.9'

jobs:
  # Validation & Guards
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard: no package-lock.json
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "❌ ERROR: package-lock.json found. Use pnpm only."
            git ls-files '**/package-lock.json'
            exit 1
          fi

      - name: Guard: no committed node_modules
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "❌ ERROR: node_modules tracked in git."
            git ls-files '**/node_modules/**' | head
            exit 1
          fi

  # Setup & Install
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

  # Linting
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, setup]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint || true
        continue-on-error: true

  # Type Checking
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, setup]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build:shared

      - name: Type check
        run: pnpm typecheck

  # Build
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, setup, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build shared package
        run: pnpm --filter @infamous-freight/shared build

      - name: Build web
        run: pnpm --filter web build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            packages/shared/dist/
            api/dist/
          retention-days: 5

      - name: Build shared package first
        run: pnpm --filter @infamous-freight/shared build
        continue-on-error: false

      - name: Lint (API)
        run: pnpm --filter infamous-freight-api lint
        continue-on-error: false

      - name: Lint (Web)
        run: pnpm --filter web typecheck
        continue-on-error: false

      - name: Notify vercel (lint)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: lint

      - name: Typecheck (Shared)
        run: pnpm --filter @infamous-freight/shared typecheck
        continue-on-error: false

      - name: Typecheck (API)
        run: pnpm --filter infamous-freight-api typecheck
        continue-on-error: false

      - name: Typecheck (Web)
        run: pnpm --filter web typecheck
        continue-on-error: false

      - name: Notify vercel (typecheck)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: typecheck

      - name: Test (API)
        run: pnpm --filter infamous-freight-api test
        continue-on-error: false

      - name: Upload API coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./api/coverage/lcov.info
          flags: api
          name: api-coverage
        if: always()

      - name: Notify vercel (test)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: test

      - name: Build (Shared)
        run: pnpm --filter @infamous-freight/shared build
        continue-on-error: false

      - name: Build (API)
        run: pnpm --filter infamous-freight-api build
        continue-on-error: false

      - name: Build (Web)
        run: pnpm --filter web build
        continue-on-error: false

      - name: Notify vercel (build)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: build
