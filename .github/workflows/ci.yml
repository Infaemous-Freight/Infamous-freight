name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'chore/**'
      - 'fix/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: infamous
          POSTGRES_PASSWORD: infamous
          POSTGRES_DB: infamous_freight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infamous -d infamous_freight_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://infamous:infamous@localhost:5432/infamous_freight_test?schema=public
      DB_USER: infamous
      DB_PASSWORD: infamous
      DB_NAME: infamous_freight_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_DB: 0
      JWT_SECRET: test-secret
      NODE_ENV: test
      PORT: 3001
      API_RATE_LIMIT_ENABLED: false
      VITE_API_URL: http://localhost:3001
      VITE_STRIPE_PUBLIC_KEY: pk_test_placeholder
      VITE_SOCKET_URL: ws://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
