name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          cd api && npm install
          cd ../web && npm install
          cd ../mobile && npm install

      - name: Lint code
        run: |
          cd api && npm run lint
          cd ../web && npm run lint
          cd ../mobile && npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run tests
        run: |
          cd api && npm test
          cd ../web && npm test
          cd ../mobile && npm test

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Type check
        run: |
          cd api && npm run type-check
          cd ../web && npm run type-check
          cd ../mobile && npm run type-check

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run security scan
        run: |
          cd api && npm audit
          cd ../web && npm audit
          cd ../mobile && npm audit

  validate-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Validate .env file
        run: |
          if [ ! -f .env ]; then
            echo ".env file is missing!"
            exit 1
          fi
          # Add more validation checks as necessary here
