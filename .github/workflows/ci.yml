name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from package.json engines)
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Show versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies (lockfile enforced)
        run: pnpm install --frozen-lockfile

      - name: Lint (if present)
        run: pnpm -r lint --if-present

      - name: Test (if present)
        run: pnpm -r test --if-present

      - name: Build (if present)
        run: pnpm -r build --if-present
