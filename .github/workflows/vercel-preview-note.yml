name: Vercel Preview Note

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  add-preview-note:
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Add preview guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-note -->';

            const body = [
              '### Preview deployment note',
              '',
              '- Vercel preview builds run for `apps/web` on this PR.',
              '- Ensure the required Vercel project environment variables are set.',
              '- After merge, production deploy is driven by the main branch workflow.'
            ].join('\n') + '\n\n' + marker;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existingComment = comments.find(
              (comment) => typeof comment.body === 'string' && comment.body.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
