name: Deploy ALL Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  deploy-fly-api:
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-vercel-web:
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  deploy-railway-db:
    uses: ./.github/workflows/deploy-railway.yml
    with:
      environment: production
    secrets: inherit

  deploy-supabase:
    uses: ./.github/workflows/deploy-supabase.yml
    secrets: inherit

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-fly-api, deploy-vercel-web, deploy-railway-db, deploy-supabase]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🌍 Multi-Platform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Fly.io API | ${{ needs.deploy-fly-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel Web | ${{ needs.deploy-vercel-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway DB | ${{ needs.deploy-railway-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
