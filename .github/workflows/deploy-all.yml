name: Deploy ALL Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  deploy-fly-api:
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-vercel-web:
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  deploy-railway-db:
    uses: ./.github/workflows/deploy-railway.yml
    with:
      environment: production
    secrets: inherit

  deploy-supabase:
    uses: ./.github/workflows/deploy-supabase.yml
    secrets: inherit

  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-fly-api, deploy-vercel-web]
    if: success()
    steps:
      - name: Test Fly.io API Health
        id: test-api
        run: |
          API_HEALTH_URL="${{ needs.deploy-fly-api.outputs.health_url }}"
          echo "Testing API: $API_HEALTH_URL"
          if [ -z "$API_HEALTH_URL" ]; then
            echo "⚠️  Skipping API health test (no health_url output)"
            exit 0
          fi
          RESPONSE=$(curl -sf "$API_HEALTH_URL" || echo '{"error":"failed"}')
          if echo "$RESPONSE" | jq -e '.success == true or .data.status == "ok"' > /dev/null 2>&1; then
            echo "✅ API health check passed"
          else
            echo "⚠️  API health check failed or unreachable"
          fi

      - name: Test Vercel Web App
        id: test-web
        run: |
          WEB_URL="${{ needs.deploy-vercel-web.outputs.deploy_url }}"
          echo "Testing Web: $WEB_URL"
          if [ -z "$WEB_URL" ]; then
            echo "⚠️  Skipping web test (no deploy_url output)"
            exit 0
          fi
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$WEB_URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Web app is accessible"
          else
            echo "⚠️  Web app returned HTTP $HTTP_CODE"
          fi

      - name: Smoke test summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- API Health: See logs above" >> $GITHUB_STEP_SUMMARY
          echo "- Web Accessibility: See logs above" >> $GITHUB_STEP_SUMMARY

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-fly-api, deploy-vercel-web, deploy-railway-db, deploy-supabase, smoke-test]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish deployment summary
        run: |
          echo "## 🌍 Multi-Platform Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Fly.io API | ${{ needs.deploy-fly-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel Web | ${{ needs.deploy-vercel-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway DB | ${{ needs.deploy-railway-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY


