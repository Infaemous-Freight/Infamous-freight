name: Release\n\non:\n  push:\n    branches:\n      - main\n\njobs:\n  release:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v2\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '16'\n\n      - name: Install Dependencies\n        run: pnpm install\n\n      - name: Activate PNPM\n        run: corepack prepare pnpm@9.15.0 --activate\n\n      - name: Release\n        run: npm run release