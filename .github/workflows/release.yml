name: Release

on:
  push:
    branches:
      - main

# Prevent overlapping release runs triggered by rapid pushes.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if this commit was created by the release workflow itself (version bump).
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          node scripts/release-version.js
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add package.json
          git commit -m "chore: release v${VERSION} [skip release]"
          git tag "v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          release_name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
