name: CI/CD — Infamous Freight

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===== TEST =====
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: |
          npx tsc -p apps/api/tsconfig.json --noEmit
          npx tsc -p apps/web/tsconfig.json --noEmit

      - name: Test
        run: npm --prefix apps/api run test:coverage

  # ===== BUILD API =====
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build:api

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API Image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest

  # ===== DEPLOY TO FLY.IO =====
  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: build-api
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # master (2026-04-08)

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app infamous-freight
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ===== NOTIFY =====
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test, build-api, deploy-api]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Notify on failure
        if: |
          needs.test.result != 'success' ||
          needs.build-api.result != 'success' ||
          needs.deploy-api.result != 'success'
        run: |
          echo "::error::Deployment failed! Check the logs above."

      - name: Notify on success
        if: |
          needs.test.result == 'success' &&
          needs.build-api.result == 'success' &&
          needs.deploy-api.result == 'success'
        run: |
          echo "::notice::Deployment successful! API: https://api.infamousfreight.com | Web: https://www.infamousfreight.com"
