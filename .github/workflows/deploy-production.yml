name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Before Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --runInBand

      - name: Build
        run: pnpm build

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - validate
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Replace this step with your production deploy command."
          echo "Examples:"
          echo "  flyctl deploy --remote-only"
          echo "  vercel deploy --prod --prebuilt --token=\$VERCEL_TOKEN"
