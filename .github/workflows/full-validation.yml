name: Full Validation

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: full-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, lint, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test -- --runInBand

      - name: Lint docs
        run: pnpm run docs:lint

      - name: Write validation summary
        if: always()
        run: |
          {
            echo "## Full Validation"
            echo ""
            echo "Validated commands:"
            echo "- pnpm install --frozen-lockfile"
            echo "- pnpm run lint"
            echo "- pnpm run build"
            echo "- pnpm run test -- --runInBand"
            echo "- pnpm run docs:lint"
            echo ""
            echo "Ref: ${{ github.ref }}"
            echo "SHA: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
