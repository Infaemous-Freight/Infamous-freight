name: Fly Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-api:
    name: Build and Deploy API to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build API prerequisites
        run: |
          npm ci
          npm run prisma:generate
          npm run build:api

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}-api
        run: |
          docker build -f Dockerfile.api -t "$IMAGE_NAME:${{ github.sha }}" .
          docker tag "$IMAGE_NAME:${{ github.sha }}" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app infamous-freight-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
