name: Workflow Failure Report
description: Report a GitHub Actions workflow failure that needs investigation
title: "[CI Failure]: "
labels:
  - ci

body:
  - type: input
    id: workflow
    attributes:
      label: Workflow name
      description: Which workflow failed?
      placeholder: CI / Deploy / E2E / Security
    validations:
      required: true

  - type: input
    id: job
    attributes:
      label: Job name
      description: Which job failed?
      placeholder: validate / build / deploy / e2e
    validations:
      required: false

  - type: input
    id: run_url
    attributes:
      label: GitHub Actions run URL or ID
      description: >
        Paste the URL of the failing GitHub Actions run
        (e.g. https://github.com/owner/repo/actions/runs/123456789)
        or the numeric run ID.
      placeholder: https://github.com/owner/repo/actions/runs/123456789
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Failure logs
      description: Paste the relevant logs or error output.
      placeholder: Add the failing step output here.
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: Suspected cause
      description: What do you think caused the failure?
      placeholder: Node mismatch, missing secret, pnpm install failure, etc.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What does this failure block?
      placeholder: Blocks PR merge / deploy / release.
    validations:
      required: false
