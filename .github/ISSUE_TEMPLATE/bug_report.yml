name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
      placeholder: Describe the expected result.
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser, device, etc.
      placeholder: Node 20 / macOS / Chrome 128
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, stack traces, or screenshots if available.
      placeholder: Add relevant logs or screenshots here.
    validations:
      required: false
