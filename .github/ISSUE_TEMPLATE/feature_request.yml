name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: Describe the pain point clearly.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or enhancement.
      placeholder: Explain the proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
      placeholder: Describe alternatives or workarounds.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: How would this improve Infamous Freight?
      placeholder: Describe expected user or business impact.
    validations:
      required: false
