name: Copilot Task
description: Agent-ready issue template for Copilot Coding Agent
title: "[Copilot Task]: "
labels:
  - copilot

body:
  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: What should Copilot implement or fix?
      placeholder: Describe the task in concrete terms.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to inspect
      description: List relevant files or directories.
      placeholder: |
        .github/workflows/...
        apps/api/...
        packages/shared/...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected outcome
      description: What should the final result be?
      placeholder: Describe the desired output or behavior.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any safety, scope, or style constraints?
      placeholder: Do not change API contracts. Keep fix minimal. Preserve CI behavior.
    validations:
      required: false
