codecov:
  require_ci_to_pass: yes
  branch: main
  max_report_age: "12h" # equates to 12 hours
  # max_report_age can be listed in hours '#h' (hours) or '#d' (days)

coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 100%
        threshold: 1%
        base: auto
    patch:
      default:
        target: 100%
        threshold: 1%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
  show_carryforward_flags: false

ignore:
  - "node_modules"
  - "coverage"
  - "dist"
  - ".next"
  - "out"

flags:
  api:
    carryforward: true
    paths:
      - apps/api/src
      - apps/api/__tests__
  web:
    carryforward: true
    paths:
      - apps/web/components
      - apps/web/pages
      - apps/web/hooks
