services:
  api:
    volumes:
      - ./:/app
      - ./apps/api:/app/apps/api
    command: sh -c "cd /app && HUSKY=0 pnpm install && pnpm --filter api dev"

  web:
    volumes:
      - ./:/app
      - ./apps/web:/app/apps/web
    command: sh -c "cd /app && HUSKY=0 pnpm install && pnpm --filter web dev"
