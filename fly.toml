# fly.toml app configuration file generated for infamous-freight on 2026-04-29T14:55:34Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'infamous-freight'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
