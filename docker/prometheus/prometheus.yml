# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Scrape Configuration
# Scrapes the Infamous Freight API and OTEL Collector.
#
# Reload without restart:
#   curl -X POST http://localhost:9090/-/reload
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    service: infamous-freight

# ── Scrape targets ─────────────────────────────────────────────────────────────
scrape_configs:
  # Infamous Freight API
  - job_name: infamous-freight-api
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # OTEL Collector internal metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 60s
